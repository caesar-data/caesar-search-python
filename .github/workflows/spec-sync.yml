name: spec-sync

# Polls the live public OpenAPI spec, regenerates the models when it changes,
# classifies the change with oasdiff, and updates a stable review branch.
# Repository Actions are not permitted to create pull requests by organization
# policy, so the workflow links to the branch for a human to open and merge.
# Merged non-breaking version bumps trigger the release workflow on main. The
# live contract flow also runs when its API key is configured.

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch: {}

env:
  SPEC_URL: https://alpha.api.trycaesar.com/openapi/public.json

permissions:
  contents: write
  actions: write

jobs:
  contract:
    runs-on: ubuntu-latest
    env:
      CAESAR_API_KEY: ${{ secrets.CAESAR_API_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - name: Report missing contract-test credentials
        if: env.CAESAR_API_KEY == ''
        run: |
          echo "::notice title=Contract check skipped::Configure the CAESAR_API_KEY repository secret to enable the live contract replay."
      - name: Replay search -> read -> feedback against staging
        if: env.CAESAR_API_KEY != ''
        env:
          CAESAR_CONTRACT: "1"
        run: uv run pytest tests/contract -v

  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - name: Fetch live spec and detect drift
        id: drift
        run: |
          curl -fsS "$SPEC_URL" -o /tmp/live-spec.json
          jq -S . /tmp/live-spec.json > /tmp/live-normalized.json
          jq -S . spec/openapi-public.json > /tmp/vendored-normalized.json
          if cmp -s /tmp/live-normalized.json /tmp/vendored-normalized.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Classify the change
        id: classify
        if: steps.drift.outputs.changed == 'true'
        run: |
          docker run --rm -v /tmp:/tmp -v "$PWD/spec:/spec" tufin/oasdiff:latest \
            breaking /spec/openapi-public.json /tmp/live-spec.json > /tmp/breaking.txt || true
          if [ -s /tmp/breaking.txt ]; then
            echo "breaking=true" >> "$GITHUB_OUTPUT"
          else
            echo "breaking=false" >> "$GITHUB_OUTPUT"
          fi
          {
            echo "summary<<EOF"
            docker run --rm -v /tmp:/tmp -v "$PWD/spec:/spec" tufin/oasdiff:latest \
              changelog /spec/openapi-public.json /tmp/live-spec.json || true
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Regenerate and test
        if: steps.drift.outputs.changed == 'true'
        run: |
          cp /tmp/live-spec.json spec/openapi-public.json
          uv sync --frozen
          uv run datamodel-codegen
          uv run ruff check .
          uv run mypy
          uv run pytest
      - name: Publish review branch (non-breaking)
        if: steps.drift.outputs.changed == 'true' && steps.classify.outputs.breaking == 'false'
        run: |
          git config user.name "caesar-spec-sync"
          git config user.email "releases@caesar.xyz"
          BRANCH="spec-sync/non-breaking"
          git fetch origin "$BRANCH" || true
          git checkout -B "$BRANCH"
          VERSION=$(uv run python -c "
          import re
          content = open('pyproject.toml').read()
          current = re.search(r'version = \"(\d+)\.(\d+)\.(\d+)\"', content)
          major, minor, patch = map(int, current.groups())
          print(f'{major}.{minor}.{patch + 1}')
          ")
          uv run python - "$VERSION" <<'PYEOF'
          import re, sys
          version = sys.argv[1]
          for path in ("pyproject.toml", "src/caesar_search/_version.py"):
              content = open(path).read()
              content = re.sub(r'version = "\d+\.\d+\.\d+"', f'version = "{version}"', content)
              content = re.sub(r'__version__ = "\d+\.\d+\.\d+"', f'__version__ = "{version}"', content)
              open(path, "w").write(content)
          PYEOF
          uv lock
          git add -A
          git commit -m "chore: regenerate from updated public spec (v${VERSION})"
          git push --force-with-lease origin "$BRANCH"
          REVIEW_URL="https://github.com/${GITHUB_REPOSITORY}/compare/main...${BRANCH}?expand=1"
          {
            echo "### Non-breaking OpenAPI change"
            echo
            echo "Review and open a pull request from [${BRANCH}](${REVIEW_URL})."
            echo "Merging publishes v${VERSION}."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=Spec review required::Review ${REVIEW_URL}"
      - name: Publish review branch (breaking)
        if: steps.drift.outputs.changed == 'true' && steps.classify.outputs.breaking == 'true'
        env:
          SUMMARY: ${{ steps.classify.outputs.summary }}
        run: |
          git config user.name "caesar-spec-sync"
          git config user.email "releases@caesar.xyz"
          BRANCH="spec-sync/breaking"
          git fetch origin "$BRANCH" || true
          git checkout -B "$BRANCH"
          git add -A
          git commit -m "feat!: regenerate from updated public spec (breaking)"
          git push --force-with-lease origin "$BRANCH"
          REVIEW_URL="https://github.com/${GITHUB_REPOSITORY}/compare/main...${BRANCH}?expand=1"
          {
            echo "### Breaking OpenAPI change"
            echo
            echo "Review and open a pull request from [${BRANCH}](${REVIEW_URL})."
            echo
            echo '```'
            printf '%s\n' "$SUMMARY"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=Breaking spec review required::Review ${REVIEW_URL}"
